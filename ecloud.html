<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hydrogen Orbital Visualizer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #050505; font-family: 'Inter', sans-serif; }
        canvas { display: block; }
        .glass-panel {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .active-btn {
            background: #3b82f6 !important;
            color: white !important;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.5);
        }
        select {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #cbd5e1;
            padding: 4px 8px;
            border-radius: 6px;
            outline: none;
        }
    </style>
</head>
<body>

    <!-- UI Overlay -->
    <div class="fixed top-6 left-6 z-10 flex flex-col gap-4 pointer-events-none">
        <div class="glass-panel p-6 rounded-2xl pointer-events-auto max-w-sm">
            <h1 class="text-white text-xl font-bold mb-2">Hydrogen Orbitals</h1>
            <p class="text-slate-400 text-sm mb-4 leading-relaxed">
                Visualizing $|\psi_{nlm}|^2$ density using real spherical harmonics. 
                Higher particle density indicates higher electron probability.
            </p>
            
            <div class="flex flex-col gap-4">
                <!-- n selection -->
                <div class="flex flex-col gap-2">
                    <label class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Principal (n)</label>
                    <div class="flex gap-2" id="n-controls">
                        <button onclick="updateN(1)" id="btn-n1" class="active-btn flex-1 py-1 rounded-lg bg-slate-800 text-slate-300 transition-all">1</button>
                        <button onclick="updateN(2)" id="btn-n2" class="flex-1 py-1 rounded-lg bg-slate-800 text-slate-300 transition-all">2</button>
                        <button onclick="updateN(3)" id="btn-n3" class="flex-1 py-1 rounded-lg bg-slate-800 text-slate-300 transition-all">3</button>
                        <button onclick="updateN(4)" id="btn-n4" class="flex-1 py-1 rounded-lg bg-slate-800 text-slate-300 transition-all">4</button>
                    </div>
                </div>

                <!-- l selection -->
                <div class="flex flex-col gap-2">
                    <label class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Angular (l)</label>
                    <div class="flex gap-2" id="l-controls">
                        <!-- Buttons injected by JS based on n -->
                    </div>
                </div>

                <!-- m selection -->
                <div class="flex flex-col gap-2">
                    <label class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Magnetic (m)</label>
                    <select id="m-select" onchange="updateM(this.value)" class="w-full text-sm">
                        <!-- Options injected by JS based on l -->
                    </select>
                </div>
            </div>

            <div class="mt-6 pt-4 border-t border-white/10">
                <div class="flex justify-between items-center text-xs text-slate-400">
                    <span>State:</span>
                    <span id="orbital-label" class="font-mono text-blue-400">1s</span>
                </div>
                <div class="flex justify-between items-center text-xs text-slate-400 mt-2">
                    <span>Wavefunction:</span>
                    <span id="formula" class="font-mono text-blue-400">$\psi_{1,0,0}$</span>
                </div>
            </div>
        </div>

        <div class="glass-panel p-4 rounded-xl pointer-events-auto text-[10px] text-slate-500 uppercase tracking-[0.2em]">
            Drag to Rotate • Scroll to Zoom
        </div>
    </div>

    <script>
        // Constants & State
        const PARTICLE_COUNT = 100000;
        let currentN = 1, currentL = 0, currentM = 0;
        let scene, camera, renderer, particles, geometry, material;
        let targetRotationX = 0, targetRotationY = 0;
        let isMouseDown = false;
        let lastMouseX = 0, lastMouseY = 0;

        // Factoring out Math for clarity
        const { sin, cos, PI, sqrt, exp, pow, atan2, acos } = Math;

        /**
         * Real Spherical Harmonics (Tesseral)
         * These produce the standard chemist shapes (px, py, pz, etc.)
         */
        function getAngularDensity(theta, phi, l, m) {
            // Simplified real spherical harmonics coefficients
            if (l === 0) return 1; // s

            if (l === 1) { // p
                if (m === 0) return cos(theta); // pz
                if (m === 1) return sin(theta) * cos(phi); // px
                if (m === -1) return sin(theta) * sin(phi); // py
            }

            if (l === 2) { // d
                if (m === 0) return 3 * cos(theta) ** 2 - 1; // dz2
                if (m === 1) return sin(theta) * cos(theta) * cos(phi); // dxz
                if (m === -1) return sin(theta) * cos(theta) * sin(phi); // dyz
                if (m === 2) return (sin(theta) ** 2) * cos(2 * phi); // dx2-y2
                if (m === -2) return (sin(theta) ** 2) * sin(2 * phi); // dxy
            }

            if (l === 3) { // f (standard subset)
                if (m === 0) return cos(theta) * (5 * cos(theta) ** 2 - 3); // fz3
                if (m === 1) return sin(theta) * (5 * cos(theta) ** 2 - 1) * cos(phi); // fxz2
                if (m === -1) return sin(theta) * (5 * cos(theta) ** 2 - 1) * sin(phi); // fyz2
                if (m === 2) return cos(theta) * sin(theta) ** 2 * cos(2 * phi); // fz(x2-y2)
                if (m === -2) return cos(theta) * sin(theta) ** 2 * sin(2 * phi); // fxyz
                if (m === 3) return sin(theta) ** 3 * cos(3 * phi); // fx(x2-3y2)
                if (m === -3) return sin(theta) ** 3 * sin(3 * phi); // fy(3x2-y2)
            }

            return 1;
        }

        /**
         * Radial Wave Function R(r)
         */
        function getRadialDensity(r, n, l) {
            const a0 = 1.0;
            const rho = (2 * r) / (n * a0);
            
            // Note: We use the square of the radial part R(r)^2
            // These are normalized for visual impact rather than absolute physical units
            let R = 1.0;
            
            if (n === 1) { // 1s
                R = exp(-rho / 2);
            } else if (n === 2) {
                if (l === 0) R = (2 - rho) * exp(-rho / 2); // 2s
                if (l === 1) R = rho * exp(-rho / 2); // 2p
            } else if (n === 3) {
                if (l === 0) R = (6 - 6 * rho + rho * rho) * exp(-rho / 2); // 3s
                if (l === 1) R = rho * (4 - rho) * exp(-rho / 2); // 3p
                if (l === 2) R = rho * rho * exp(-rho / 2); // 3d
            } else if (n === 4) {
                if (l === 0) R = (24 - 36 * rho + 12 * rho * rho - rho ** 3 / 1) * exp(-rho / 2); // 4s
                if (l === 1) R = rho * (20 - 10 * rho + rho * rho) * exp(-rho / 2); // 4p
                if (l === 2) R = rho * rho * (6 - rho) * exp(-rho / 2); // 4d
                if (l === 3) R = pow(rho, 3) * exp(-rho / 2); // 4f
            }

            return R * R;
        }

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 20;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            updateLControls();
            createParticles();

            // Interaction
            document.addEventListener('mousedown', () => isMouseDown = true);
            document.addEventListener('mouseup', () => isMouseDown = false);
            document.addEventListener('mousemove', onMouseMove);
            document.addEventListener('wheel', onMouseWheel);
            window.addEventListener('resize', onWindowResize);

            animate();
        }

        function createParticles() {
            if (particles) scene.remove(particles);

            geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(PARTICLE_COUNT * 3);
            const colors = new Float32Array(PARTICLE_COUNT * 3);
            const sizes = new Float32Array(PARTICLE_COUNT);

            let i = 0;
            const scaleFactor = 6;
            const maxR = currentN * scaleFactor;
            
            // Attempt limit to prevent infinite loops on very sparse regions
            let attempts = 0;
            const maxAttempts = PARTICLE_COUNT * 50;

            while (i < PARTICLE_COUNT && attempts < maxAttempts) {
                attempts++;
                const x = (Math.random() - 0.5) * maxR * 2;
                const y = (Math.random() - 0.5) * maxR * 2;
                const z = (Math.random() - 0.5) * maxR * 2;
                
                const r = sqrt(x*x + y*y + z*z);
                const theta = acos(z / (r || 1e-6));
                const phi = atan2(y, x);
                
                const radProb = getRadialDensity(r, currentN, currentL);
                const angProb = getAngularDensity(theta, phi, currentL, currentM);
                
                const prob = radProb * (angProb * angProb);
                
                // Rejection sampling threshold
                if (Math.random() < prob * 1.5) {
                    positions[i * 3] = x;
                    positions[i * 3 + 1] = y;
                    positions[i * 3 + 2] = z;

                    // Color: Shift hue based on phase/m for p, d, f
                    const phaseColor = (angProb >= 0) ? 0.6 : 0.05; // Blue/Orange for phases
                    const saturation = 0.7;
                    const brightness = 0.4 + (prob * 0.6);
                    
                    const color = new THREE.Color().setHSL(phaseColor, saturation, brightness);
                    
                    colors[i * 3] = color.r;
                    colors[i * 3 + 1] = color.g;
                    colors[i * 3 + 2] = color.b;
                    
                    sizes[i] = 0.05 + Math.random() * 0.1;
                    i++;
                }
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

            material = new THREE.PointsMaterial({
                size: 0.1,
                vertexColors: true,
                transparent: true,
                opacity: 0.7,
                blending: THREE.AdditiveBlending,
                sizeAttenuation: true
            });

            particles = new THREE.Points(geometry, material);
            scene.add(particles);
        }

        // --- UI Updates ---

        function updateN(n) {
            currentN = n;
            if (currentL >= n) currentL = n - 1;
            
            document.querySelectorAll('#n-controls button').forEach(btn => btn.classList.remove('active-btn'));
            document.getElementById(`btn-n${n}`).classList.add('active-btn');
            
            updateLControls();
            refreshOrbital();
        }

        function updateL(l) {
            currentL = parseInt(l);
            currentM = 0;
            updateMControls();
            refreshOrbital();
        }

        function updateM(m) {
            currentM = parseInt(m);
            refreshOrbital();
        }

        function updateLControls() {
            const container = document.getElementById('l-controls');
            container.innerHTML = '';
            const labels = ['s', 'p', 'd', 'f'];
            
            for (let i = 0; i < currentN && i < 4; i++) {
                const btn = document.createElement('button');
                btn.innerText = labels[i];
                btn.className = `flex-1 py-1 rounded-lg bg-slate-800 text-slate-300 transition-all ${currentL === i ? 'active-btn' : ''}`;
                btn.onclick = () => {
                    document.querySelectorAll('#l-controls button').forEach(b => b.classList.remove('active-btn'));
                    btn.classList.add('active-btn');
                    updateL(i);
                };
                container.appendChild(btn);
            }
            updateMControls();
        }

        function updateMControls() {
            const select = document.getElementById('m-select');
            select.innerHTML = '';
            
            for (let i = -currentL; i <= currentL; i++) {
                const opt = document.createElement('option');
                opt.value = i;
                opt.text = i === 0 ? '0' : (i > 0 ? `+${i}` : i);
                if (i === currentM) opt.selected = true;
                select.appendChild(opt);
            }
        }

        function refreshOrbital() {
            const labels = ['s', 'p', 'd', 'f'];
            document.getElementById('orbital-label').innerText = `${currentN}${labels[currentL]} (m=${currentM})`;
            document.getElementById('formula').innerText = `\\psi_{${currentN},${currentL},${currentM}}`;
            createParticles();
        }

        // --- Camera & Animation ---

        function onMouseMove(event) {
            if (isMouseDown) {
                const deltaX = event.clientX - lastMouseX;
                const deltaY = event.clientY - lastMouseY;
                targetRotationY += deltaX * 0.01;
                targetRotationX += deltaY * 0.01;
            }
            lastMouseX = event.clientX;
            lastMouseY = event.clientY;
        }

        function onMouseWheel(event) {
            camera.position.z += event.deltaY * 0.02;
            camera.position.z = Math.max(5, Math.min(80, camera.position.z));
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            if (particles) {
                particles.rotation.y += (targetRotationY - particles.rotation.y) * 0.1;
                particles.rotation.x += (targetRotationX - particles.rotation.x) * 0.1;
                particles.rotation.y += 0.001; // slow drift
            }
            renderer.render(scene, camera);
        }

        window.onload = init;
    </script>
</body>
</html>
